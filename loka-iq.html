<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Lokavana</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:       #3b5e45;
      --green-deep:  #2a4332;
      --green-mid:   #4e7a5c;
      --green-pale:  #d4e6d9;
      --cream:       #faf6ee;
      --cream-dark:  #f0e9d8;
      --beige:       #e8dcc8;
      --gold:        #b8945a;
      --gold-lt:     #d4a96a;
      --black:       #1c1c1a;
      --white:       #ffffff;
      --text-dark:   #2a2a26;
      --text-mid:    #5a5a52;
      --text-light:  #9a9a8a;
      --font-d:      'Playfair Display', serif;
      --font-b:      'Raleway', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-b);
      background: var(--white);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; }
    .screen.active { display: flex; animation: sIn .4s cubic-bezier(.22,1,.36,1); }
    @keyframes sIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

    /* ══════════════════════════════════════════
       HOME
    ══════════════════════════════════════════ */
    #home { background: var(--white); }

    .hero {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 32px;
      position: relative;
      overflow: hidden;
    }

    /* soft radial glow behind logo */
    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 240px;
      background: radial-gradient(ellipse at 50% 30%, rgba(78,122,92,.09) 0%, transparent 70%);
      pointer-events: none;
    }

    /* watermark leaf bg */
    .hero-leaf-bg {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 240px; height: 300px;
      opacity: .04;
      pointer-events: none;
    }

    .logo-circle {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: var(--green-deep);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(42,67,50,.22), 0 2px 8px rgba(42,67,50,.12);
      position: relative; z-index: 1;
      animation: popIn .8s cubic-bezier(.22,1,.36,1);
    }
    @keyframes popIn { from { opacity:0; transform:scale(.7) translateY(8px); } to { opacity:1; transform:none; } }

    .resort-name {
      font-family: var(--font-d);
      font-size: clamp(2.2rem, 9vw, 3rem);
      font-weight: 500;
      letter-spacing: .14em;
      color: var(--green-deep);
      text-transform: uppercase;
      margin-top: 18px;
      position: relative; z-index: 1;
      animation: fUp .7s .1s both;
    }
    .resort-tag {
      font-size: .67rem;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-top: 5px;
      position: relative; z-index: 1;
      animation: fUp .7s .2s both;
    }
    @keyframes fUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

    .divider-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 18px 0 0;
      width: 100%; max-width: 200px;
      position: relative; z-index: 1;
      animation: fUp .7s .25s both;
    }
    .divider-row .dl { flex:1; height:1px; background:var(--beige); }
    .divider-row .dd { width:4px; height:4px; border-radius:50%; background:var(--gold); opacity:.7; }

    /* ── GRID ── */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      padding: 28px 18px 28px;
      width: 100%; max-width: 460px;
    }

    .gbtn {
      background: var(--white);
      border: 1.5px solid var(--beige);
      border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 11px;
      padding: 28px 14px;
      cursor: pointer;
      transition: all .26s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 4px 20px rgba(42,67,50,.07);
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    .gbtn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--green-deep);
      transform: scaleY(0); transform-origin: bottom;
      transition: transform .3s cubic-bezier(.22,1,.36,1);
      border-radius: 20px;
    }
    .gbtn:hover::before, .gbtn:active::before { transform: scaleY(1); }
    .gbtn:hover, .gbtn:active {
      border-color: var(--green-deep);
      box-shadow: 0 12px 36px rgba(42,67,50,.2);
      transform: translateY(-4px);
    }
    .gbtn:hover .glabel, .gbtn:active .glabel { color: var(--cream); }
    .gbtn:hover .gicon, .gbtn:active .gicon {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.18);
    }
    .gbtn:hover .gicon svg, .gbtn:active .gicon svg { color: var(--gold-lt); }

    .gicon {
      width: 50px; height: 50px;
      border-radius: 13px;
      background: var(--green-pale);
      border: 1px solid rgba(59,94,69,.1);
      display: flex; align-items: center; justify-content: center;
      transition: all .26s;
      position: relative; z-index: 1;
    }
    .gicon svg { color: var(--green-deep); transition: color .26s; }

    .glabel {
      font-size: .71rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-dark);
      font-weight: 600;
      transition: color .26s;
      position: relative; z-index: 1;
    }

    .gbtn:nth-child(1) { animation: fUp .6s .3s both; }
    .gbtn:nth-child(2) { animation: fUp .6s .38s both; }
    .gbtn:nth-child(3) { animation: fUp .6s .46s both; }
    .gbtn:nth-child(4) { animation: fUp .6s .54s both; }
    .gbtn:nth-child(5) { animation: fUp .6s .62s both; }
    .gbtn:nth-child(6) { animation: fUp .6s .70s both; }

    .home-footer {
      font-size: .59rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--text-light); padding: 8px 0 40px;
      animation: fUp .7s .8s both;
    }

    /* ══════════════════════════════════════════
       INNER SCREENS
    ══════════════════════════════════════════ */
    .inner { background: var(--cream); }

    .ihead {
      width: 100%;
      background: var(--green-deep);
      display: flex; align-items: center;
      padding: 18px 18px;
      gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .bkbtn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .bkbtn:hover { background: rgba(255,255,255,.2); }
    .bkbtn svg { color: var(--cream); }

    .ihead-title { font-family: var(--font-d); font-size: 1.18rem; font-weight: 500; color: var(--cream); letter-spacing: .06em; }
    .ihead-sub   { font-size: .59rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-lt); margin-top: 2px; }

    .mbody {
      width: 100%; max-width: 500px;
      padding: 24px 20px 60px;
      margin: 0 auto;
    }

    .slabel {
      font-size: .59rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); font-weight: 600;
      margin: 28px 0 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .slabel::before { content:''; width:14px; height:1px; background:var(--gold); opacity:.5; }
    .slabel::after  { content:''; flex:1; height:1px; background:rgba(184,148,90,.18); }

    .mitem {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 13px 0;
      border-bottom: 1px solid rgba(42,67,50,.07);
      gap: 16px;
    }
    .mitem:last-child { border-bottom: none; }
    .mitem-info { flex: 1; }
    .mitem-name  { font-family: var(--font-d); font-size: 1.02rem; font-weight: 400; color: var(--text-dark); line-height: 1.3; }
    .mitem-desc  { font-size: .69rem; color: var(--text-mid); margin-top: 3px; line-height: 1.5; }
    .mitem-price { font-family: var(--font-d); font-size: .98rem; color: var(--green); white-space: nowrap; padding-top: 2px; font-weight: 500; }

    /* Tourist Spots */
    .spot {
      background: var(--white);
      border: 1px solid var(--beige);
      border-radius: 14px;
      padding: 15px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 12px rgba(42,67,50,.05);
    }
    .spot-ico {
      width: 42px; height: 42px;
      border-radius: 11px;
      background: var(--green-pale);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .spot-ico svg { color: var(--green); }
    .spot-name { font-family: var(--font-d); font-size: .96rem; color: var(--text-dark); }
    .spot-type { font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-light); margin-top: 2px; }
    .spot-dist {
      font-size: .7rem; font-weight: 600; color: var(--green);
      background: var(--green-pale);
      padding: 4px 10px; border-radius: 20px; white-space: nowrap; margin-left: auto;
    }

    /* Activities */
    .act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .act-chip {
      background: var(--white);
      border: 1.5px solid var(--beige);
      border-radius: 12px;
      padding: 13px 13px;
      display: flex; align-items: center; gap: 9px;
      box-shadow: 0 2px 8px rgba(42,67,50,.05);
    }
    .act-chip svg { color: var(--green-mid); flex-shrink: 0; }
    .act-chip span { font-size: .73rem; font-weight: 500; color: var(--text-dark); line-height: 1.3; }

    /* ══════════════════════════════════════════
       MODALS
    ══════════════════════════════════════════ */
    .ovl {
      display: none;
      position: fixed; inset: 0;
      background: rgba(26,26,20,.58);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .ovl.active { display: flex; animation: ovlIn .25s ease; }
    @keyframes ovlIn { from { opacity:0; } to { opacity:1; } }

    .sheet {
      background: var(--white);
      border-radius: 26px 26px 0 0;
      width: 100%; max-width: 500px;
      padding-bottom: env(safe-area-inset-bottom, 32px);
      position: relative;
      animation: shUp .36s cubic-bezier(.22,1,.36,1);
      max-height: 88vh; overflow-y: auto;
    }
    @keyframes shUp { from { transform:translateY(100%); } to { transform:none; } }

    .sh-handle { width: 38px; height: 4px; background: var(--beige); border-radius: 2px; margin: 13px auto 0; }

    .sh-head {
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--cream-dark);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .sh-icon-box {
      width: 46px; height: 46px;
      border-radius: 13px;
      background: var(--green-pale);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 11px;
    }
    .sh-icon-box svg { color: var(--green); }
    .sh-title { font-family: var(--font-d); font-size: 1.4rem; font-weight: 500; color: var(--text-dark); }
    .sh-sub   { font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-light); margin-top: 3px; }

    .sh-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--cream-dark); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      -webkit-tap-highlight-color: transparent;
    }
    .sh-close svg { color: var(--text-mid); }

    .sh-body { padding: 22px 26px 8px; }

    /* WiFi */
    .wifi-row {
      background: var(--cream);
      border: 1px solid var(--beige);
      border-radius: 13px;
      padding: 15px 18px; margin-bottom: 11px;
    }
    .wifi-lbl { font-size: .59rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 5px; }
    .wifi-val { font-family: var(--font-d); font-size: 1.25rem; color: var(--text-dark); word-break: break-all; }

    /* Contact */
    .cbtn {
      display: flex; align-items: center; gap: 16px;
      padding: 17px 18px; border-radius: 15px; border: 1.5px solid;
      cursor: pointer; text-decoration: none; font-family: var(--font-b);
      transition: all .22s ease; margin-bottom: 11px;
      -webkit-tap-highlight-color: transparent;
    }
    .cbtn.wa { background: rgba(37,211,102,.06); border-color: rgba(37,211,102,.25); color: #1a8a44; }
    .cbtn.wa:hover { background: rgba(37,211,102,.13); transform: translateY(-2px); }
    .cbtn.wa .cbico { background: rgba(37,211,102,.11); }
    .cbtn.wa .cbico svg { color: #1fad5c; }
    .cbtn.ca { background: rgba(184,148,90,.06); border-color: rgba(184,148,90,.25); color: var(--gold); }
    .cbtn.ca:hover { background: rgba(184,148,90,.13); transform: translateY(-2px); }
    .cbtn.ca .cbico { background: rgba(184,148,90,.1); }
    .cbtn.ca .cbico svg { color: var(--gold); }
    .cbico {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cblbl { font-size: .61rem; letter-spacing: .18em; text-transform: uppercase; opacity: .6; }
    .cbval { font-family: var(--font-d); font-size: 1.08rem; }
  </style>
</head>
<body>

<!-- ════════════════ DINNER ════════════════ -->

  <div class="ihead">
    <button class="bkbtn" onclick="showScreen('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div><div class="ihead-title">Dinner Menu</div><div class="ihead-sub">Evening · 7 PM – 10:30 PM</div></div>
  </div>
  <div class="mbody" id="dinner-menu-body"></div>
</div>

<!-- ════════════════ EXPLORE ════════════════ -->
<div id="explore" class="screen inner">
  <div class="ihead">
    <button class="bkbtn" onclick="showScreen('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div><div class="ihead-title">Explore Around</div><div class="ihead-sub">Tourist Spots & Activities</div></div>
  </div>
  <div class="mbody">
    <div class="slabel">Nearby Attractions</div>
    <div id="spots-list"></div>
    <div class="slabel" style="margin-top:30px">Activities at Lokavana</div>
    <div class="act-grid" id="act-grid"></div>
  </div>
</div>

<!-- ════════════════ WIFI MODAL ════════════════ -->
<div id="ovl-wifi" class="ovl" onclick="ovlClick(event,'ovl-wifi')">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <div>
        <div class="sh-icon-box">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
        </div>
        <div class="sh-title">WiFi Access</div>
        <div class="sh-sub">Connect & stay in touch</div>
      </div>
      <button class="sh-close" onclick="closeOvl('ovl-wifi')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sh-body">
      <div class="wifi-row"><div class="wifi-lbl">Network Name</div><div class="wifi-val" id="wname"></div></div>
      <div class="wifi-row"><div class="wifi-lbl">Password</div><div class="wifi-val" id="wpass"></div></div>
    </div>
  </div>
</div>

/* ── Navigation ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ── Modals ── */
function openOvl(id) { document.getElementById(id).classList.add('active'); }
function closeOvl(id) { document.getElementById(id).classList.remove('active'); }
function ovlClick(e, id) { if (e.target.id === id) closeOvl(id); }

/* ── Build home grid ── */
function buildGrid() {
  const g = document.getElementById('home-grid');
  const btns = [
    { label:'Menu',        icon:'menu',      fn:"showScreen('menu')"        },
    { label:'Dinner Menu', icon:'dinner',    fn:"showScreen('dinner')"      },
    { label:'WiFi',        icon:'wifi',      fn:"openOvl('ovl-wifi')"       },
    { label:'Contact',     icon:'contact',   fn:"openOvl('ovl-contact')"    },
    { label:'Explore',     icon:'explore',   fn:"showScreen('explore')"     },
    { label:'Instagram',   icon:'instagram', fn:"goInsta()"                 },
  ];
  g.innerHTML = btns.map(b => `
    <button class="gbtn" onclick="${b.fn}">
      <div class="gicon">${I[b.icon]}</div>
      <span class="glabel">${b.label}</span>
    </button>`).join('');
}

/* ── Build menu ── */
function buildMenu(id, sections) {
  document.getElementById(id).innerHTML = sections.map(s => `
    <div class="slabel">${s.section}</div>
    ${s.items.map(it => `
      <div class="mitem">
        <div class="mitem-info">
          <div class="mitem-name">${it.name}</div>
          <div class="mitem-desc">${it.desc}</div>
        </div>
        <div class="mitem-price">${it.price}</div>
      </div>`).join('')}
  `).join('');
}

/* ── Build spots ── */
function buildSpots() {
  document.getElementById('spots-list').innerHTML = CONFIG.touristSpots.map(s => `
    <div class="spot">
      <div class="spot-ico">${I[s.type] || I.explore}</div>
      <div>
        <div class="spot-name">${s.name}</div>
        <div class="spot-type">${s.type}</div>
      </div>
      <div class="spot-dist">${s.distance}</div>
    </div>`).join('');
}

/* ── Build activities ── */
function buildActs() {
  document.getElementById('act-grid').innerHTML = CONFIG.activities.map(a => `
    <div class="act-chip">
      ${I[a.type] || I.explore}
      <span>${a.name}</span>
    </div>`).join('');
}

/* ── Instagram ── */
function goInsta() {
  window.open('https://instagram.com/' + CONFIG.instagramHandle, '_blank', 'noopener');
}

/* ── Init ── */
(function init() {
  document.title = CONFIG.resortName;
  document.getElementById('rname').textContent = CONFIG.resortName;
  document.getElementById('rtag').textContent  = CONFIG.resortTagline;
  document.getElementById('hfoot').textContent = '© ' + CONFIG.resortName + ' · All rights reserved';

  document.getElementById('wname').textContent = CONFIG.wifiName;
  document.getElementById('wpass').textContent = CONFIG.wifiPassword;

  document.getElementById('wa-link').href    = 'https://wa.me/' + CONFIG.whatsappNumber;
  document.getElementById('call-link').href  = 'tel:' + CONFIG.phoneNumber;
  document.getElementById('cnum').textContent = CONFIG.phoneNumber;

  buildGrid();
  buildMenu('main-menu-body',   CONFIG.mainMenu);
  buildMenu('dinner-menu-body', CONFIG.dinnerMenu);
  buildSpots();
  buildActs();
})();
</script>
